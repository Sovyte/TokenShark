<div class="keyboard-shortcuts-modal" id="keyboard-shortcuts-modal" role="dialog" aria-modal="true" aria-label="Keyboard shortcuts">
    <div class="modal-overlay" data-close-modal></div>
    <div class="modal-content">
        <div class="modal-header">
            <h3>Keyboard Shortcuts</h3>
            <button class="modal-close" data-close-modal aria-label="Close">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="shortcuts-grid">
                <div class="shortcuts-group">
                    <h4>General</h4>
                    <div class="shortcut-row"><span>Command palette</span><kbd>⌘</kbd><kbd>K</kbd></div>
                    <div class="shortcut-row"><span>Toggle theme</span><kbd>T</kbd></div>
                    <div class="shortcut-row"><span>Help</span><kbd>?</kbd></div>
                    <div class="shortcut-row"><span>Focus search</span><kbd>/</kbd></div>
                </div>
                <div class="shortcuts-group">
                    <h4>Navigation</h4>
                    <div class="shortcut-row"><span>Dashboard</span><kbd>G</kbd><kbd>D</kbd></div>
                    <div class="shortcut-row"><span>Events</span><kbd>G</kbd><kbd>E</kbd></div>
                    <div class="shortcut-row"><span>Analytics</span><kbd>G</kbd><kbd>A</kbd></div>
                    <div class="shortcut-row"><span>Alerts</span><kbd>G</kbd><kbd>L</kbd></div>
                    <div class="shortcut-row"><span>Settings</span><kbd>G</kbd><kbd>S</kbd></div>
                    <div class="shortcut-row"><span>API Keys</span><kbd>G</kbd><kbd>K</kbd></div>
                </div>
                <div class="shortcuts-group">
                    <h4>Actions</h4>
                    <div class="shortcut-row"><span>Copy API key</span><kbd>⌘</kbd><kbd>C</kbd></div>
                    <div class="shortcut-row"><span>Export data</span><kbd>⌘</kbd><kbd>E</kbd></div>
                    <div class="shortcut-row"><span>Toggle sidebar</span><kbd>⌘</kbd><kbd>B</kbd></div>
                    <div class="shortcut-row"><span>Notifications</span><kbd>N</kbd></div>
                </div>
            </div>
        </div>
    </div>
</div>
