{% extends "base.html" %}
{% set title = "Sign in" %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-brand">
            <img src="/static/images/TokenShark.png" alt="" width="48" height="48">
            <h1>Welcome back</h1>
            <p>Sign in to your TokenShark account</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form" novalidate>
            <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">

            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="you@company.com" required autofocus autocomplete="email">
            </div>

            <div class="form-group">
                <div class="form-label-row">
                    <label for="password" class="form-label">Password</label>
                    <a href="{{ url_for('auth.forgot_password') }}" class="form-link">Forgot?</a>
                </div>
                <div class="password-input-wrapper">
                    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="password-toggle" data-target="password" aria-label="Toggle password visibility">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
            </div>

            <div class="form-group form-group-checkbox">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember" value="true" checked>
                    <span class="checkbox-check"></span>
                    <span>Remember me for 30 days</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-lg">
                Sign in
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </form>

        <div class="auth-divider">
            <span>or</span>
        </div>

        <button class="btn btn-ghost btn-full btn-social" disabled title="Coming soon">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Continue with Google
        </button>

        <p class="auth-footer">
            Don't have an account? <a href="{{ url_for('auth.register') }}">Get started free</a>
        </p>
    </div>

    <div class="auth-visual" aria-hidden="true">
        <div class="auth-visual-bg">
            <div class="auth-visual-grid"></div>
            <div class="auth-visual-glow"></div>
        </div>
        <div class="auth-visual-card">
            <div class="auth-visual-header">
                <div class="auth-visual-dots"><span></span><span></span><span></span></div>
            </div>
            <div class="auth-visual-body">
                <div class="auth-visual-stat">
                    <span class="auth-visual-label">Monthly Savings</span>
                    <span class="auth-visual-value">$4,247</span>
                </div>
                <div class="auth-visual-chart"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
